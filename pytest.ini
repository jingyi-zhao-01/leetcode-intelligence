[pytest]
# Test discovery patterns
testpaths = packages
pythonpath = 
    services/leetcode-submission-service/src
    services/leetcode-mcp-service/src
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
