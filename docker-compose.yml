services:
  submission_server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PYTHONPATH: packages/submission_server/src
      SUBMISSION_HOST: 0.0.0.0
      SUBMISSION_PORT: 3000
    command: >-
      sh -c "uv run prisma generate --schema prisma/schema.prisma &&
      uv run submission-server"
    ports:
      - "3000:3000"
    restart: unless-stopped

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PYTHONPATH: packages/mcp-server/src
    command: >-
      sh -c "uv run prisma generate --schema prisma/schema.prisma &&
      uv run mcp-server-stdio"
    stdin_open: true
    tty: true
    restart: unless-stopped
