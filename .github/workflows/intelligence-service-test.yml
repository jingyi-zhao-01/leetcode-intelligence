name: intelligence-service-test

on:
  pull_request:
    paths:
      - "services/leetcode-intelligence-service/**"
      - "services/shared/prisma/schema.prisma"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/intelligence-service-test.yml"
  push:
    branches:
      - main
      - init-simplepy
    paths:
      - "services/leetcode-intelligence-service/**"
      - "services/shared/prisma/schema.prisma"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/intelligence-service-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run intelligence unit tests
        run: npm run --workspace services/leetcode-intelligence-service test:unit

      - name: Run intelligence integration tests
        run: npm run --workspace services/leetcode-intelligence-service test:integration
