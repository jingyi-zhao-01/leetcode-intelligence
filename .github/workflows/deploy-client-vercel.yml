name: Deploy client to Vercel

on:
  push:
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client-vercel.yml'
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client-vercel.yml'
  workflow_dispatch:

concurrency:
  group: client-vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' || !(github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy client preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./client
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-prod:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy client production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./client
          github-token: ${{ secrets.GITHUB_TOKEN }}
