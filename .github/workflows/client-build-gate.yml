name: Client Build Gate

on:
  push:
    paths:
      - "client/**"
      - ".github/workflows/client-build-gate.yml"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client-build-gate.yml"
  workflow_dispatch:

concurrency:
  group: client-build-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Verify client build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build --workspace client
