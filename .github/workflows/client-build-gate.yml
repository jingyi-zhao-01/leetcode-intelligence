---
name: Client Build Gate

on:
    push:
        paths:
            - client/**
            - config/eslint/**
            - client/eslint.config.mjs
            - client/tsconfig.base.json
            - client/tsconfig.json
            - tsconfig.shared.json
            - package.json
            - package-lock.json
            - .github/workflows/client-build-gate.yml
    pull_request:
        paths:
            - client/**
            - config/eslint/**
            - client/eslint.config.mjs
            - client/tsconfig.base.json
            - client/tsconfig.json
            - tsconfig.shared.json
            - package.json
            - package-lock.json
            - .github/workflows/client-build-gate.yml
    workflow_dispatch:

concurrency:
    group: client-build-gate-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint client
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint client
              run: npm run lint:client

    build:
        name: Verify client build
        needs: lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build client
              run: npm run build --workspace client
