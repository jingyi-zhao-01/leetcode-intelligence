name: intelligence-preview-destroy

on:
  delete:
  workflow_dispatch:

permissions:
  contents: read

env:
  PREVIEW_ID: preview
  HOMELAB_CLOUD_REPO: jingyi-zhao-01/homelab-cloud

jobs:
  notify-homelab-cloud:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref == 'preview')
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch preview teardown to homelab-cloud
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_CLOUD_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ env.HOMELAB_CLOUD_REPO }}
          PREVIEW_ID: ${{ env.PREVIEW_ID }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMELAB_CLOUD_DISPATCH_TOKEN is missing"
            exit 1
          fi

          payload=$(jq -n \
            --arg preview_id "$PREVIEW_ID" \
            '{
              event_type: "leetcode-intelligence-preview-destroy",
              client_payload: {
                preview_id: $preview_id,
                delete_namespace: true
              }
            }')

          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${TARGET_REPO}/dispatches \
            -d "$payload"
