---
name: architecture-diagram

on:
    push:
        paths:
            - architecture.d2
            - .github/workflows/architecture-diagram.yml
    workflow_dispatch:

permissions:
    contents: write

jobs:
    render:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Install D2
              run: curl -fsSL https://d2lang.com/install.sh | sh -s --

            - name: Add D2 to PATH
              run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Render architecture SVG
              run: d2 architecture.d2 architecture.svg

            - name: Commit rendered SVG
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: 'ci: update architecture.svg'
                  file_pattern: architecture.svg
