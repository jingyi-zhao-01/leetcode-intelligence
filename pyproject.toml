[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "simplepy"
version = "0.1.0"
description = "A simple Python project example"
authors = ["OpenHands <openhands@all-hands.dev>"]
readme = "README.md"
license = "MIT"
packages = [{ include = "simplepy", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.9,<4.0"
llama-index = "*"
llama-index-llms-openai = "*"
llama-index-readers-file = "*"
python-dotenv = "*"

[tool.poetry.group.dev.dependencies]
pytest = "*"

[tool.poetry.scripts]
simplepy = "simplepy.cli:main"
simplepy-qa = "simplepy.qa:main"
simplepy-mentor = "simplepy.mentor:main"
