[build-system]
requires = ["setuptools>=71"]
build-backend = "setuptools.build_meta"

[project]
name = "leetcode-ingestor"
version = "0.1.0"
description = "LeetCode problems ingestor"
authors = [{name = "OpenHands", email = "openhands@all-hands.dev"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    "requests>=2.32.5",
    "python-dotenv",
    "prisma>=0.15.0",
    "pydantic>=2.12.3",
]

[project.scripts]
ingest-problems = "ingestor.run_ingest:run"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
