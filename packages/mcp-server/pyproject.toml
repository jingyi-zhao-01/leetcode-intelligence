[build-system]
requires = ["setuptools>=71"]
build-backend = "setuptools.build_meta"

[project]
name = "leetcode-mcp-server"
version = "0.1.0"
description = "LeetCode MCP Server - problem ingestion and submission analysis"
authors = [{name = "OpenHands", email = "openhands@all-hands.dev"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    "llama-index",
    "llama-index-readers-file",
    "python-dotenv",
    "chromadb>=1.2.1",
    "requests>=2.32.5",
    "pydantic>=2.12.3",
    "prisma>=0.15.0",
    "fastapi>=0.119.1",
    "uvicorn>=0.38.0",
    "fastapi-mcp>=0.4.0",
    "fastmcp>=2.12.5",
    "openai>=2.6.0",
    "leetcode-submissions",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov>=7.0.0",
]

[project.scripts]
mcp-server        = "server:main"
mcp-server-stdio  = "server:main_stdio"
ingest-problems   = "problems.run_ingest:run"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
