[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "leetcode-submissions"
version = "0.1.0"
description = "LeetCode Submissions Management Package"
authors = ["OpenHands <openhands@all-hands.dev>"]
readme = "README.md"
license = "MIT"
packages = [{include = "*", from = "src"}]

[tool.poetry.dependencies]
python = "^3.12"
prisma = "^0.15.0"
fastapi = "^0.119.1"
uvicorn = "^0.38.0"
colorama = "^0.4.6"
tabulate = "^0.9.0"

[tool.poetry.group.dev.dependencies]
pytest = "*"
pytest-cov = "^7.0.0"

[tool.poetry.scripts]
submission-stats = "submission_stats:main"
problem-graph = "problem_graph:main"
submission-server = "submission_server:run"
analytics-server = "analytics_server:run"
