[build-system]
requires = ["setuptools>=71"]
build-backend = "setuptools.build_meta"

[project]
name = "leetcode-submissions"
version = "0.1.0"
description = "LeetCode Submissions Management Package"
authors = [{name = "OpenHands", email = "openhands@all-hands.dev"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    "prisma>=0.15.0",
    "fastapi>=0.119.1",
    "uvicorn>=0.38.0",
    "colorama>=0.4.6",
    "tabulate>=0.9.0",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov>=7.0.0",
]

[project.scripts]
submission-stats = "submission_stats:main"
problem-graph = "problem_graph:main"
submission-server = "submission_server:run"
analytics-server = "analytics_server:run"

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = [
    "analytics_server",
    "code_cleaner",
    "graph_models",
    "graph_service",
    "problem_graph",
    "submission_server",
    "submission_stats",
    "timer_service",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = ["-v", "--tb=short"]
