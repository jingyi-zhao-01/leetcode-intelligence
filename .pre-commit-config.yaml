---
repos:
    - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
      rev: 0.2.1 # or other specific tag
      hooks:
          - id: yamlfmt
    - repo: local
      hooks:
          - id: prettier-ts
            name: Prettier (TypeScript surfaces)
            entry: npm
            args: [exec, --, prettier, --write]
            language: system
            files: ^(client|services|config)/.*\.(js|cjs|mjs|ts|tsx|json|md|css)$|^(package(-lock)?\.json|tsconfig.*\.json|eslint\.config\.mjs)$
            pass_filenames: true
            always_run: false
          - id: eslint-services
            name: ESLint (services)
            entry: npm
            args: [run, lint:services]
            language: system
            files: ^services/|^config/eslint/|^eslint\.config\.mjs$|^services/tsconfig\.base\.json$|^tsconfig\.shared\.json$|^package(-lock)?\.json$
            pass_filenames: false
            always_run: false
          - id: eslint-client
            name: ESLint (client)
            entry: npm
            args: [run, lint:client]
            language: system
            files: ^client/|^client/eslint\.config\.mjs$|^client/tsconfig(\.base)?\.json$|^config/eslint/|^tsconfig\.shared\.json$|^package(-lock)?\.json$
            pass_filenames: false
            always_run: false
